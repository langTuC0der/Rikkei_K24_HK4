<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14" />
      <stop offset="100%" stop-color="#0f0f35" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow-emerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#222554" stroke-width="2" />

  <style>
    .title-text { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
    .label-text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
    .desc-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: #9ca3af; text-anchor: middle; }
    .status-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #10b981; text-anchor: middle; font-weight: 700; }
  </style>

  <text x="500" y="45" class="title-text">Sản Phẩm Đồ Án Tốt Nghiệp Capstone (Capstone Deliverables)</text>

  <!-- Central Project Node -->
  <rect x="380" y="180" width="240" height="90" rx="12" fill="url(#emerald-grad)" stroke="#34d399" stroke-width="2" filter="url(#glow-emerald)" />
  <text x="500" y="215" class="label-text">CAPSTONE PROJECT 2026</text>
  <text x="500" y="235" class="desc-text" fill="#ecfdf5">Học viên xây dựng ứng dụng AI</text>
  <text x="500" y="250" class="desc-text" fill="#a7f3d0">áp dụng 3 trụ cột kỹ thuật</text>

  <!-- Deliverables Nodes (Surrounding) -->
  <!-- Top Left: Architecture -->
  <rect x="80" y="80" width="220" height="60" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.5" />
  <text x="190" y="105" class="label-text" fill="#38bdf8" style="font-size: 11px;">1. System Architecture</text>
  <text x="190" y="125" class="desc-text" style="font-size: 10px;">Sơ đồ luồng &amp; Model Selection</text>

  <!-- Middle Left: Prompt Library -->
  <rect x="50" y="200" width="220" height="60" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.5" />
  <text x="160" y="225" class="label-text" fill="#38bdf8" style="font-size: 11px;">2. Prompt Library</text>
  <text x="160" y="245" class="desc-text" style="font-size: 10px;">System &amp; Task Prompts</text>

  <!-- Bottom Left: Context Design -->
  <rect x="80" y="320" width="220" height="60" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.5" />
  <text x="190" y="345" class="label-text" fill="#38bdf8" style="font-size: 11px;">3. Context Architecture</text>
  <text x="190" y="365" class="desc-text" style="font-size: 10px;">RAG + MCP + Memory + Cache</text>

  <!-- Top Right: Harness Design -->
  <rect x="700" y="80" width="220" height="60" rx="8" fill="#111827" stroke="#a855f7" stroke-width="1.5" />
  <text x="810" y="105" class="label-text" fill="#c084fc" style="font-size: 11px;">4. Harness Design</text>
  <text x="810" y="125" class="desc-text" style="font-size: 10px;">LangGraph + Tools + Guardrails</text>

  <!-- Middle Right: Eval Report -->
  <rect x="730" y="200" width="220" height="60" rx="8" fill="#111827" stroke="#a855f7" stroke-width="1.5" />
  <text x="840" y="225" class="label-text" fill="#c084fc" style="font-size: 11px;">5. Evaluation Report</text>
  <text x="840" y="245" class="desc-text" style="font-size: 10px;">Golden Dataset &amp; LLM-as-Judge</text>

  <!-- Bottom Right: Cost Analysis -->
  <rect x="700" y="320" width="220" height="60" rx="8" fill="#111827" stroke="#a855f7" stroke-width="1.5" />
  <text x="810" y="345" class="label-text" fill="#c084fc" style="font-size: 11px;">6. Cost &amp; Routing Analysis</text>
  <text x="810" y="365" class="desc-text" style="font-size: 10px;">Định tuyến &amp; Tối ưu hóa bộ đệm</text>

  <!-- Connections: Center to deliverables -->
  <path d="M 380 225 L 270 225" fill="none" stroke="#34d399" stroke-width="2" />
  <path d="M 380 225 L 300 110" fill="none" stroke="#34d399" stroke-width="2" />
  <path d="M 380 225 L 300 350" fill="none" stroke="#34d399" stroke-width="2" />
  
  <path d="M 620 225 L 730 225" fill="none" stroke="#34d399" stroke-width="2" />
  <path d="M 620 225 L 700 110" fill="none" stroke="#34d399" stroke-width="2" />
  <path d="M 620 225 L 700 350" fill="none" stroke="#34d399" stroke-width="2" />
</svg>
