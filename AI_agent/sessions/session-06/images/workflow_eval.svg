<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <init>
        <stop offset="0%" stop-color="#080c14" />
        <stop offset="100%" stop-color="#0f0f35" />
      </init>
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#222554" stroke-width="2" />

  <style>
    .title-text { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
    .label-text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
    .desc-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: #9ca3af; text-anchor: middle; }
    .status-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #a78bfa; text-anchor: middle; font-weight: 700; }
  </style>

  <text x="500" y="45" class="title-text">Quy Trình 4 Bước Tạo Học Liệu Tự Động Với Antigravity Skill</text>

  <!-- Node 1: Reasoning -->
  <rect x="50" y="160" width="180" height="100" rx="12" fill="url(#blue-grad)" stroke="#38bdf8" stroke-width="2" />
  <text x="140" y="200" class="label-text">1. REASONING</text>
  <text x="140" y="225" class="desc-text" fill="#e0f2fe">Đọc PM.md &amp; Tiêu chí</text>
  <text x="140" y="242" class="desc-text" fill="#93c5fd">Lập &amp; duyệt Dàn ý</text>

  <!-- Arrow: 1 -> 2 -->
  <path d="M 230 210 L 290 210" fill="none" stroke="#38bdf8" stroke-width="3" />
  <polygon points="280,205 290,210 280,215" fill="#38bdf8" />

  <!-- Node 2: Generation -->
  <rect x="300" y="160" width="180" height="100" rx="12" fill="url(#cyan-grad)" stroke="#22d3ee" stroke-width="2" />
  <text x="390" y="200" class="label-text">2. GENERATION</text>
  <text x="390" y="225" class="desc-text" fill="#ecfeff">Sinh bản thảo thô</text>
  <text x="390" y="242" class="desc-text" fill="#67e8f9">Ép cấu trúc 7 phần</text>

  <!-- Arrow: 2 -> 3 -->
  <path d="M 480 210 L 540 210" fill="none" stroke="#22d3ee" stroke-width="3" />
  <polygon points="530,205 540,210 530,215" fill="#22d3ee" />

  <!-- Node 3: QA Review -->
  <rect x="550" y="160" width="180" height="100" rx="12" fill="url(#purple-grad)" stroke="#c084fc" stroke-width="2" filter="url(#glow-purple)" />
  <text x="640" y="200" class="label-text">3. QA REVIEW</text>
  <text x="640" y="225" class="desc-text" fill="#f3e8ff">Tự kiểm duyệt lỗi</text>
  <text x="640" y="242" class="desc-text" fill="#c084fc">Self-Reflection Loop</text>

  <!-- Arrow: 3 -> 4 -->
  <path d="M 730 210 L 790 210" fill="none" stroke="#c084fc" stroke-width="3" />
  <polygon points="780,205 790,210 780,215" fill="#c084fc" />

  <!-- Node 4: Assembly -->
  <rect x="800" y="160" width="150" height="100" rx="12" fill="url(#emerald-grad)" stroke="#34d399" stroke-width="2" />
  <text x="875" y="200" class="label-text">4. ASSEMBLY</text>
  <text x="875" y="225" class="desc-text" fill="#ecfdf5">Ghi tệp vật lý</text>
  <text x="875" y="242" class="desc-text" fill="#a7f3d0">Đóng gói Deploy</text>

  <!-- Loop: QA -> Gen (Goes below in case of error) -->
  <path d="M 640 260 Q 515 350 390 260" fill="none" stroke="#f43f5e" stroke-width="2.5" stroke-dasharray="6,4" />
  <polygon points="387,270 390,260 397,268" fill="#f43f5e" />
  <rect x="460" y="295" width="100" height="20" rx="10" fill="#0f172a" stroke="#f43f5e" stroke-width="1.5" />
  <text x="510" y="309" class="status-text" fill="#f43f5e" style="font-size: 9px;">PHÁT HIỆN LỖI (SỬA)</text>
</svg>
