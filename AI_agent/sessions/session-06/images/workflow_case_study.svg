<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14" />
      <stop offset="100%" stop-color="#0f0f35" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#222554" stroke-width="2" />

  <style>
    .title-text { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
    .label-text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
    .desc-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: #9ca3af; text-anchor: middle; }
    .status-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #a78bfa; text-anchor: middle; font-weight: 700; }
  </style>

  <text x="500" y="45" class="title-text">Kiến Trúc Đa Tác Nhân Cộng Tác (Multi-Agent Collaboration)</text>

  <!-- Orchestrator -->
  <rect x="400" y="90" width="200" height="80" rx="12" fill="url(#purple-grad)" stroke="#c084fc" stroke-width="2" filter="url(#glow-purple)" />
  <text x="500" y="125" class="label-text">ORCHESTRATOR</text>
  <text x="500" y="145" class="desc-text" fill="#f3e8ff">Điều phối trung tâm (LangGraph)</text>

  <!-- Connectors from Orchestrator to Specialists -->
  <path d="M 500 170 L 500 240 L 200 240 L 200 280" fill="none" stroke="#a855f7" stroke-width="2.5" />
  <polygon points="195,270 200,280 205,270" fill="#a855f7" />

  <path d="M 500 170 L 500 280" fill="none" stroke="#a855f7" stroke-width="2.5" />
  <polygon points="495,270 500,280 505,270" fill="#a855f7" />

  <path d="M 500 170 L 500 240 L 800 240 L 800 280" fill="none" stroke="#a855f7" stroke-width="2.5" />
  <polygon points="795,270 800,280 805,270" fill="#a855f7" />

  <!-- Specialist Agent 1: Research -->
  <rect x="100" y="280" width="200" height="90" rx="10" fill="url(#blue-grad)" stroke="#38bdf8" stroke-width="1.5" />
  <text x="200" y="315" class="label-text">Research Agent</text>
  <text x="200" y="335" class="desc-text" fill="#e0f2fe">MCP: Web search &amp; DB read</text>
  <text x="200" y="350" class="desc-text" fill="#93c5fd">Trích xuất tri thức</text>

  <!-- Specialist Agent 2: Writer -->
  <rect x="400" y="280" width="200" height="90" rx="10" fill="url(#cyan-grad)" stroke="#22d3ee" stroke-width="1.5" />
  <text x="500" y="315" class="label-text">Writer Agent</text>
  <text x="500" y="335" class="desc-text" fill="#ecfeff">Style &amp; Content Templates</text>
  <text x="500" y="350" class="desc-text" fill="#67e8f9">Soạn thảo tài liệu</text>

  <!-- Specialist Agent 3: Reviewer -->
  <rect x="700" y="280" width="200" height="90" rx="10" fill="url(#emerald-grad)" stroke="#34d399" stroke-width="1.5" />
  <text x="800" y="315" class="label-text">Reviewer Agent</text>
  <text x="800" y="335" class="desc-text" fill="#ecfdf5">A2A validation &amp; QA</text>
  <text x="800" y="350" class="desc-text" fill="#a7f3d0">Đánh giá chất lượng</text>

  <!-- A2A Communication Rays -->
  <path d="M 300 325 L 400 325" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4,4" />
  <text x="350" y="315" class="status-text" fill="#22d3ee" style="font-size: 8px;">A2A Protocol</text>

  <path d="M 600 325 L 700 325" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="4,4" />
  <text x="650" y="315" class="status-text" fill="#34d399" style="font-size: 8px;">A2A Protocol</text>
</svg>
