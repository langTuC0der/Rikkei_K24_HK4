<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14" />
      <stop offset="100%" stop-color="#0f0f35" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#222554" stroke-width="2" />

  <style>
    .title-text { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
    .label-text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
    .desc-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: #9ca3af; text-anchor: middle; }
    .status-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #22d3ee; text-anchor: middle; font-weight: 700; }
  </style>

  <text x="500" y="45" class="title-text">Kiến Trúc Định Tuyến Mô Hình &amp; Tối Ưu Hóa Caching (2026)</text>

  <!-- User Query -->
  <rect x="50" y="180" width="160" height="70" rx="10" fill="url(#blue-grad)" stroke="#38bdf8" stroke-width="2" />
  <text x="130" y="215" class="label-text">Yêu cầu (Query)</text>
  <text x="130" y="235" class="desc-text" fill="#e0f2fe">Từ người dùng cuối</text>

  <!-- Arrow: Query -> Caching -->
  <path d="M 210 215 L 270 215" fill="none" stroke="#38bdf8" stroke-width="3" />
  <polygon points="260,210 270,215 260,220" fill="#38bdf8" />

  <!-- Caching Filter Node -->
  <rect x="270" y="160" width="180" height="110" rx="12" fill="url(#cyan-grad)" stroke="#22d3ee" stroke-width="2" filter="url(#glow-cyan)" />
  <text x="360" y="195" class="label-text">BỘ NHỚ ĐỆM (CACHE)</text>
  <text x="360" y="220" class="desc-text" fill="#ecfeff">Exact Match Cache</text>
  <text x="360" y="235" class="desc-text" fill="#ecfeff">Semantic Cache (Embedding)</text>
  <text x="360" y="250" class="desc-text" fill="#ecfeff">Prompt Caching ($ saving)</text>

  <!-- Cache Hit Branch -->
  <path d="M 360 160 L 360 110 L 800 110" fill="none" stroke="#10b981" stroke-width="2.5" stroke-dasharray="6,4" />
  <polygon points="790,105 800,110 790,115" fill="#10b981" />
  <text x="500" y="100" class="status-text" fill="#34d399">CACHE HIT (Trả kết quả lập tức - Tiết kiệm 90%)</text>

  <!-- Arrow: Cache Miss -> Router -->
  <path d="M 450 215 L 510 215" fill="none" stroke="#22d3ee" stroke-width="3" />
  <polygon points="500,210 510,215 500,220" fill="#22d3ee" />

  <!-- Model Router -->
  <rect x="510" y="165" width="180" height="100" rx="12" fill="url(#purple-grad)" stroke="#c084fc" stroke-width="2" />
  <text x="600" y="200" class="label-text">PHÂN LOẠI / ROUTER</text>
  <text x="600" y="225" class="desc-text" fill="#f3e8ff">Complexity Classifier</text>
  <text x="600" y="242" class="desc-text" fill="#c084fc">Phân tích ý định &amp; độ khó</text>

  <!-- Routing Paths: Router -> Models -->
  <!-- Path 1: Simple -> Flash -->
  <path d="M 690 190 L 750 150 L 800 150" fill="none" stroke="#38bdf8" stroke-width="2" />
  <polygon points="790,145 800,150 790,155" fill="#38bdf8" />
  <text x="740" y="140" class="status-text" fill="#38bdf8" style="font-size: 9px;">Độ khó thấp</text>

  <!-- Path 2: Complex -> Fable -->
  <path d="M 690 240 L 750 280 L 800 280" fill="none" stroke="#a855f7" stroke-width="2" />
  <polygon points="790,275 800,280 790,285" fill="#a855f7" />
  <text x="740" y="300" class="status-text" fill="#a855f7" style="font-size: 9px;">Độ khó cao</text>

  <!-- Target Model 1: Flash -->
  <rect x="800" y="125" width="160" height="50" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" />
  <text x="880" y="155" class="label-text" fill="#e2e8f0" style="font-size: 11px;">Gemini 3.5 Flash ($)</text>

  <!-- Target Model 2: Fable -->
  <rect x="800" y="255" width="160" height="50" rx="8" fill="#1e293b" stroke="#c084fc" stroke-width="1.5" />
  <text x="880" y="285" class="label-text" fill="#e2e8f0" style="font-size: 11px;">Claude Fable 5 ($$$)</text>

  <!-- Output Node -->
  <rect x="510" y="340" width="180" height="70" rx="10" fill="url(#emerald-grad)" stroke="#34d399" stroke-width="2" />
  <text x="600" y="375" class="label-text">PHẢN HỒI (RESPONSE)</text>
  <text x="600" y="395" class="desc-text" fill="#ecfdf5">Tổng hợp kết quả trả về</text>

  <!-- Connect Models back to Output -->
  <path d="M 960 150 L 980 150 L 980 375 L 690 375" fill="none" stroke="#34d399" stroke-width="2" />
  <path d="M 960 280 L 980 280" fill="none" stroke="#34d399" stroke-width="2" />
  <polygon points="700,370 690,375 700,380" fill="#34d399" />
</svg>
