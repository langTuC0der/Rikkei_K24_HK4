<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14" />
      <stop offset="100%" stop-color="#0f0f35" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#222554" stroke-width="2" />

  <!-- Styles -->
  <style>
    .title-text { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
    .label-text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
    .desc-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: #9ca3af; text-anchor: middle; }
    .code-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #e2e8f0; }
  </style>

  <text x="500" y="35" class="title-text">Chu Trình Phản Tỉnh Tự Sửa Lỗi (Reflexion Pattern)</text>

  <!-- Node 1: User Input -->
  <rect x="50" y="200" width="130" height="60" rx="8" fill="rgba(255,255,255,0.03)" stroke="#38bdf8" stroke-width="1.5" />
  <text x="115" y="228" class="label-text" fill="#38bdf8">Ý Định / Task</text>
  <text x="115" y="245" class="desc-text">User yêu cầu viết code</text>

  <!-- Link 1 -> 2 -->
  <line x1="180" y1="230" x2="240" y2="230" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 235 225 L 245 230 L 235 235 Z" fill="#6b7280" />

  <!-- Node 2: Attempt (Draft) -->
  <rect x="240" y="180" width="150" height="100" rx="10" fill="url(#cyan-grad)" stroke="#22d3ee" stroke-width="1" />
  <text x="315" y="210" class="label-text">1. BẢN NHÁP</text>
  <text x="315" y="230" class="label-text">(ATTEMPT)</text>
  <text x="315" y="255" class="desc-text" fill="#ffffff">AI sinh code/JSON</text>
  <text x="315" y="270" class="desc-text" fill="#e0f2fe">lần đầu tiên</text>

  <!-- Link 2 -> 3 -->
  <line x1="390" y1="230" x2="450" y2="230" stroke="#6b7280" stroke-width="2" />
  <path d="M 445 225 L 455 230 L 445 235 Z" fill="#6b7280" />

  <!-- Node 3: Execute (Sandbox) -->
  <rect x="450" y="180" width="150" height="100" rx="10" fill="url(#purple-grad)" stroke="#a78bfa" stroke-width="1" filter="url(#glow-purple)" />
  <text x="525" y="210" class="label-text">2. THỰC THI</text>
  <text x="525" y="230" class="label-text">(EXECUTE)</text>
  <text x="525" y="255" class="desc-text" fill="#f3e8ff">Chạy test case /</text>
  <text x="525" y="270" class="desc-text" fill="#f3e8ff">Parse JSON schema</text>

  <!-- Link 3 -> 4 -->
  <line x1="600" y1="230" x2="660" y2="230" stroke="#6b7280" stroke-width="2" />
  <path d="M 655 225 L 665 230 L 655 235 Z" fill="#6b7280" />

  <!-- Node 4: Observe (Result/Error) -->
  <rect x="660" y="180" width="150" height="100" rx="10" fill="url(#orange-grad)" stroke="#fb923c" stroke-width="1" filter="url(#glow-orange)" />
  <text x="735" y="210" class="label-text">3. QUAN SÁT</text>
  <text x="735" y="230" class="label-text">(OBSERVE)</text>
  <text x="735" y="255" class="desc-text" fill="#ffedd5">Lỗi! ZeroDivision /</text>
  <text x="735" y="270" class="desc-text" fill="#ffedd5">JSON thiếu trường</text>

  <!-- Link 4 -> 5 (Success Case: Right Output) -->
  <line x1="810" y1="230" x2="870" y2="230" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4" />
  <path d="M 865 225 L 875 230 L 865 235 Z" fill="#10b981" />
  <text x="840" y="215" class="desc-text" fill="#34d399">Thành công</text>

  <!-- Node 5: Success Output -->
  <rect x="870" y="200" width="100" height="60" rx="8" fill="url(#emerald-grad)" stroke="#34d399" stroke-width="1.5" />
  <text x="920" y="235" class="label-text">KẾT QUẢ</text>

  <!-- REFLEXION LOOP (Feedback path from 4 -> 6 -> 2) -->
  <!-- Link 4 down to 6 -->
  <path d="M 735 280 L 735 370 L 525 370" fill="none" stroke="#fb923c" stroke-width="2" />
  <path d="M 530 365 L 520 370 L 530 375 Z" fill="#fb923c" />
  <text x="640" y="355" class="desc-text" fill="#fb923c">Nếu xảy ra lỗi (Fail log)</text>

  <!-- Node 6: Reflect & Memory -->
  <rect x="360" y="320" width="160" height="90" rx="10" fill="rgba(30, 41, 59, 0.9)" stroke="#fb923c" stroke-width="1.5" />
  <text x="440" y="345" class="label-text" fill="#fb923c">4. PHẢN TỈNH (REFLECT)</text>
  <text x="440" y="365" class="desc-text" fill="#e2e8f0">Phân tích logs lỗi,</text>
  <text x="440" y="380" class="desc-text" fill="#e2e8f0">lưu kinh nghiệm vào</text>
  <text x="440" y="395" class="label-text" font-size="11" fill="#fbbf24">💾 Episodic Memory</text>

  <!-- Link 6 back to 2 -->
  <path d="M 360 370 L 315 370 L 315 285" fill="none" stroke="#22d3ee" stroke-width="2" />
  <path d="M 310 295 L 315 285 L 320 295 Z" fill="#22d3ee" />
  <text x="260" y="340" class="desc-text" fill="#22d3ee">Thử lại v2 / v3</text>

</svg>
