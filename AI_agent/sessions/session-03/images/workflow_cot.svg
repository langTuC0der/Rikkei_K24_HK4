<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a23" />
      <stop offset="100%" stop-color="#12123a" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e4f" />
      <stop offset="100%" stop-color="#16163f" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#2d2d6a" stroke-width="2" />

  <!-- Fonts Style -->
  <style>
    .title { font-family: 'Inter', system-ui, sans-serif; font-size: 15px; font-weight: 700; fill: #ffffff; }
    .header-text { font-family: 'Inter', system-ui, sans-serif; font-size: 18px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
    .sub-title { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #9ca3bf; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
    .node-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #e8e8f0; }
    .node-label { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 600; fill: #22d3ee; }
  </style>

  <!-- Main Title -->
  <text x="500" y="35" class="header-text">Sơ đồ CoT: Mô hình Standard vs Mô hình Reasoning 2026</text>

  <!-- LEFT PANEL: Standard LLM + CoT -->
  <rect x="40" y="60" width="420" height="350" rx="12" fill="rgba(255,255,255,0.01)" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="60" y="85" class="sub-title" fill="#a78bfa">Standard LLM (Cần CoT thủ công)</text>

  <!-- Left: Input Query -->
  <rect x="60" y="110" width="380" height="40" rx="6" fill="url(#card-grad)" stroke="#2d2d6a" stroke-width="1" />
  <text x="75" y="134" class="node-label">INPUT</text>
  <text x="130" y="134" class="node-text">"Bài toán logic... + Hãy nghĩ từng bước"</text>

  <!-- Left: Explicit CoT Steps -->
  <rect x="60" y="170" width="380" height="150" rx="6" fill="url(#card-grad)" stroke="#8b5cf6" stroke-width="1" />
  <text x="75" y="195" class="node-label" fill="#a78bfa">EXPLICIT REASONING (HIỂN THỊ)</text>
  <text x="75" y="225" class="node-text">1. Phân tích: Có 3 dây chuyền A, B, C...</text>
  <text x="75" y="250" class="node-text">2. Tính toán: P(Lỗi) = 0.4*0.02 + 0.35*0.03...</text>
  <text x="75" y="275" class="node-text">3. Áp dụng Bayes: P(B|Lỗi) = P(B)*P(Lỗi|B)/P(Lỗi)</text>
  <text x="75" y="300" class="node-text">4. Kết luận: Xác suất bằng 31.8%</text>

  <!-- Left: Output -->
  <rect x="60" y="340" width="380" height="50" rx="6" fill="url(#card-grad)" stroke="#34d399" stroke-width="1.5" />
  <text x="75" y="370" class="node-label" fill="#34d399">OUTPUT</text>
  <text x="140" y="370" class="node-text">Lời giải chi tiết + Đáp án: 31.8%</text>


  <!-- RIGHT PANEL: 2026 Reasoning Model -->
  <rect x="540" y="60" width="420" height="350" rx="12" fill="rgba(255,255,255,0.01)" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="560" y="85" class="sub-title" fill="#22d3ee">Reasoning Model (Suy luận ngầm tự động)</text>

  <!-- Right: Input Query -->
  <rect x="560" y="110" width="380" height="40" rx="6" fill="url(#card-grad)" stroke="#2d2d6a" stroke-width="1" />
  <text x="575" y="134" class="node-label">INPUT</text>
  <text x="630" y="134" class="node-text">"Bài toán logic..." (Không cần CoT prompt)</text>

  <!-- Right: Hidden Reasoning Processing -->
  <rect x="560" y="170" width="380" height="150" rx="6" fill="url(#card-grad)" stroke="#22d3ee" stroke-width="1" filter="url(#glow-cyan)" />
  <text x="575" y="195" class="node-label" fill="#22d3ee">INTERNAL REASONING (SUY NGHĨ NGẦM)</text>
  <!-- Animated glow representation inside -->
  <circle cx="750" cy="250" r="40" fill="none" stroke="url(#cyan-grad)" stroke-width="2" stroke-dasharray="8,4" />
  <circle cx="750" cy="250" r="25" fill="none" stroke="url(#cyan-grad)" stroke-width="1" />
  <text x="575" y="235" class="node-text" fill="#9ca3bf">[Model tự tạo chuỗi suy nghĩ ẩn]</text>
  <text x="575" y="260" class="node-text" fill="#9ca3bf">[Tối ưu hóa lập luận và tự sửa lỗi]</text>
  <text x="575" y="285" class="node-text" fill="#9ca3bf">[Không hiển thị ra giao diện người dùng]</text>

  <!-- Right: Output -->
  <rect x="560" y="340" width="380" height="50" rx="6" fill="url(#card-grad)" stroke="#34d399" stroke-width="1.5" />
  <text x="575" y="370" class="node-label" fill="#34d399">OUTPUT</text>
  <text x="640" y="370" class="node-text">Đáp án: 31.8% (Trực tiếp, gọn gàng, độ trễ thấp)</text>

</svg>
