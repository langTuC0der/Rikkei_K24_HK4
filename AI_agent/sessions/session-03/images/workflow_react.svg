<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a1e" />
      <stop offset="100%" stop-color="#0c0e2b" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="magenta-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#1d2256" stroke-width="2" />

  <!-- Styles -->
  <style>
    .title-text { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
    .label-text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
    .desc-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: #9ca3af; text-anchor: middle; }
    .type-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: bold; fill: #a5b4fc; text-anchor: middle; }
  </style>

  <text x="500" y="35" class="title-text">Chu Trình ReAct Loop (Reason + Act)</text>

  <!-- Input Node -->
  <rect x="40" y="195" width="130" height="70" rx="8" fill="rgba(255,255,255,0.02)" stroke="#6366f1" stroke-width="1.5" />
  <text x="105" y="225" class="label-text" fill="#a5b4fc">Ý Định / Query</text>
  <text x="105" y="245" class="desc-text">"Thời tiết Hà Nội"</text>

  <!-- Input Arrow -->
  <line x1="170" y1="230" x2="220" y2="230" stroke="#6366f1" stroke-width="2" />
  <path d="M 215 225 L 225 230 L 215 235 Z" fill="#6366f1" />

  <!-- ReAct Agent Box -->
  <rect x="220" y="70" width="530" height="320" rx="14" fill="rgba(255,255,255,0.01)" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="8,4" />
  <text x="485" y="95" class="label-text" fill="#818cf8">VÒNG LẶP SỰ KIỆN AGENT (REACT AGENTIC LOOP)</text>

  <!-- Node 1: Thought -->
  <rect x="250" y="180" width="120" height="90" rx="10" fill="url(#purple-grad)" stroke="#818cf8" stroke-width="1.5" filter="url(#glow-purple)" />
  <text x="310" y="210" class="label-text">1. SUY NGHĨ</text>
  <text x="310" y="230" class="type-label">(THOUGHT)</text>
  <text x="310" y="255" class="desc-text" fill="#e0e7ff">"Cần lấy thời tiết"</text>

  <!-- Arrow Thought -> Action -->
  <line x1="370" y1="225" x2="430" y2="225" stroke="#a78bfa" stroke-width="2" />
  <path d="M 425 220 L 435 225 L 425 230 Z" fill="#a78bfa" />

  <!-- Node 2: Action -->
  <rect x="430" y="180" width="120" height="90" rx="10" fill="url(#magenta-grad)" stroke="#f472b6" stroke-width="1.5" filter="url(#glow-magenta)" />
  <text x="490" y="210" class="label-text">2. HÀNH ĐỘNG</text>
  <text x="490" y="230" class="type-label">(ACTION)</text>
  <text x="490" y="255" class="desc-text" fill="#fce7f3">Gọi tool qua MCP</text>

  <!-- Arrow Action -> Observation -->
  <line x1="550" y1="225" x2="610" y2="225" stroke="#fb7185" stroke-width="2" />
  <path d="M 605 220 L 615 225 L 605 230 Z" fill="#fb7185" />

  <!-- Node 3: Observation -->
  <rect x="610" y="180" width="120" height="90" rx="10" fill="url(#green-grad)" stroke="#34d399" stroke-width="1.5" filter="url(#glow-green)" />
  <text x="670" y="210" class="label-text">3. QUAN SÁT</text>
  <text x="670" y="230" class="type-label">(OBSERVATION)</text>
  <text x="670" y="255" class="desc-text" fill="#ecfdf5">Kết quả trả về</text>

  <!-- Loop back path: Observation back to Thought -->
  <path d="M 670 180 L 670 120 L 310 120 L 310 180" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="4,2" />
  <path d="M 305 170 L 310 180 L 315 170 Z" fill="#34d399" />
  <text x="490" y="140" class="desc-text" fill="#34d399">Nạp ngữ cảnh mới &amp; Tiếp tục suy luận</text>

  <!-- Final Answer Exit Path -->
  <path d="M 310 270 L 310 350 L 800 350" fill="none" stroke="#818cf8" stroke-width="2.5" />
  <path d="M 795 345 L 805 350 L 795 355 Z" fill="#818cf8" />
  <text x="490" y="340" class="desc-text" fill="#818cf8">Khi đã đủ thông tin $\rightarrow$ Final Answer</text>

  <!-- External Tool Node (Bottom) -->
  <rect x="400" y="310" width="180" height="50" rx="6" fill="url(#card-grad)" stroke="#ec4899" stroke-width="1.5" />
  <text x="490" y="340" class="label-text" fill="#f472b6">☁️ THẾ GIỚI THỰC / MCP</text>
  
  <!-- Bidirectional arrows to MCP -->
  <path d="M 470 270 L 470 310" fill="none" stroke="#ec4899" stroke-width="1.5" />
  <path d="M 465 305 L 470 310 L 475 305 Z" fill="#ec4899" />
  
  <path d="M 510 310 L 510 270" fill="none" stroke="#34d399" stroke-width="1.5" />
  <path d="M 505 275 L 510 270 L 515 275 Z" fill="#34d399" />

  <!-- Output Node -->
  <rect x="800" y="195" width="160" height="70" rx="8" fill="url(#green-grad)" stroke="#34d399" stroke-width="1.5" />
  <text x="880" y="230" class="label-text">ĐẦU RA CUỐI</text>
  <text x="880" y="248" class="desc-text" fill="#ffffff">"Thời tiết HN ấm áp..."</text>

</svg>
