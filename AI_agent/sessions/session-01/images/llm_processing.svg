<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14" />
      <stop offset="100%" stop-color="#0f0f35" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#222554" stroke-width="2" />

  <style>
    .title-text { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
    .label-text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
    .desc-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: #9ca3af; text-anchor: middle; }
    .status-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #a78bfa; text-anchor: middle; font-weight: 700; }
  </style>

  <text x="500" y="45" class="title-text">Quy Trình Xử Lý Ngôn Ngữ Của Transformer (Next-Token Prediction)</text>

  <!-- Node 1: Input Text -->
  <rect x="50" y="160" width="180" height="100" rx="12" fill="url(#blue-grad)" stroke="#38bdf8" stroke-width="2" />
  <text x="140" y="200" class="label-text">INPUT TEXT</text>
  <text x="140" y="225" class="desc-text" fill="#e0f2fe">Văn bản thô đầu vào</text>
  <text x="140" y="242" class="desc-text" fill="#93c5fd">Ví dụ: "Xin chào"</text>

  <!-- Arrow: Input -> Tokenizer -->
  <path d="M 230 210 L 290 210" fill="none" stroke="#38bdf8" stroke-width="3" />
  <polygon points="280,205 290,210 280,215" fill="#38bdf8" />

  <!-- Node 2: Tokenizer -->
  <rect x="290" y="160" width="180" height="100" rx="12" fill="url(#cyan-grad)" stroke="#22d3ee" stroke-width="2" />
  <text x="380" y="200" class="label-text">TOKENIZATION</text>
  <text x="380" y="225" class="desc-text" fill="#ecfeff">Cắt thành mảnh token</text>
  <text x="380" y="242" class="desc-text" fill="#67e8f9">["Xin", "ch", "ào"]</text>

  <!-- Arrow: Tokenizer -> Attention -->
  <path d="M 470 210 L 530 210" fill="none" stroke="#22d3ee" stroke-width="3" />
  <polygon points="520,205 530,210 520,215" fill="#22d3ee" />

  <!-- Node 3: Attention Mechanism -->
  <rect x="530" y="160" width="200" height="100" rx="12" fill="url(#purple-grad)" stroke="#c084fc" stroke-width="2" filter="url(#glow-purple)" />
  <text x="630" y="200" class="label-text">ATTENTION LAYER</text>
  <text x="630" y="225" class="desc-text" fill="#f3e8ff">Tính toán mối liên hệ</text>
  <text x="630" y="242" class="desc-text" fill="#c084fc">Trọng số chú ý ngữ nghĩa</text>

  <!-- Arrow: Attention -> Predictor -->
  <path d="M 730 210 L 790 210" fill="none" stroke="#c084fc" stroke-width="3" />
  <polygon points="780,205 790,210 780,215" fill="#c084fc" />

  <!-- Node 4: Predictor -->
  <rect x="790" y="160" width="160" height="100" rx="12" fill="url(#emerald-grad)" stroke="#34d399" stroke-width="2" />
  <text x="870" y="200" class="label-text">NEXT-TOKEN PREDICT</text>
  <text x="870" y="225" class="desc-text" fill="#ecfdf5">Tính xác suất</text>
  <text x="870" y="242" class="desc-text" fill="#a7f3d0">Token tiếp theo</text>
</svg>
