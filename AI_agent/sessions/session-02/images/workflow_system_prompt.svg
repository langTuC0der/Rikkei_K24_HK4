<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a23" />
      <stop offset="100%" stop-color="#12123a" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e4f" />
      <stop offset="100%" stop-color="#16163f" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#2d2d6a" stroke-width="2" />

  <!-- Fonts Style -->
  <style>
    .title { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #e8e8f0; }
    .sub-title { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #9ca3bf; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .node-text { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: #e8e8f0; }
    .node-label { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 600; fill: #22d3ee; }
    .glow-text { fill: #ffffff; font-weight: 700; filter: drop-shadow(0px 0px 4px rgba(255,255,255,0.5)); }
  </style>

  <!-- Left Side: Prompts Container -->
  <!-- System Prompt Group -->
  <rect x="30" y="30" width="360" height="230" rx="12" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="45" y="52" class="sub-title" fill="#818cf8">System Prompt (Có cấu trúc)</text>

  <!-- Role Card -->
  <rect x="45" y="70" width="330" height="45" rx="6" fill="url(#card-grad)" stroke="#2d2d6a" stroke-width="1" />
  <text x="60" y="90" class="node-label">&lt;role&gt;</text>
  <text x="120" y="90" class="node-text">Senior Backend Engineer</text>

  <!-- Constraints Card -->
  <rect x="45" y="125" width="330" height="60" rx="6" fill="url(#card-grad)" stroke="#2d2d6a" stroke-width="1" />
  <text x="60" y="145" class="node-label" fill="#f472b6">&lt;constraints&gt;</text>
  <text x="170" y="145" class="node-text">- KHÔNG dùng built-in</text>
  <text x="170" y="165" class="node-text">- PHẢI viết Type Hints</text>

  <!-- Format Card -->
  <rect x="45" y="195" width="330" height="45" rx="6" fill="url(#card-grad)" stroke="#2d2d6a" stroke-width="1" />
  <text x="60" y="215" class="node-label" fill="#fbbf24">&lt;output_format&gt;</text>
  <text x="180" y="215" class="node-text">PEP8 Python Code</text>

  <!-- User Prompt Group -->
  <rect x="30" y="280" width="360" height="135" rx="12" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="45" y="302" class="sub-title" fill="#22d3ee">User Prompt</text>

  <!-- Input Data Card -->
  <rect x="45" y="320" width="330" height="75" rx="6" fill="url(#card-grad)" stroke="#2d2d6a" stroke-width="1" />
  <text x="60" y="345" class="node-label" fill="#22d3ee">&lt;input_data&gt;</text>
  <text x="60" y="365" class="node-text">Đoạn code cần tối ưu</text>

  <!-- Connections to LLM -->
  <!-- Top Connection (System Prompt) -->
  <path d="M 390 145 L 480 145 C 510 145 510 225 540 225" fill="none" stroke="#818cf8" stroke-width="2.5" />
  <polygon points="535,221 545,225 535,229" fill="#818cf8" />

  <!-- Bottom Connection (User Prompt) -->
  <path d="M 390 350 L 480 350 C 510 350 510 225 540 225" fill="none" stroke="#22d3ee" stroke-width="2.5" />
  <polygon points="535,221 545,225 535,229" fill="#22d3ee" />

  <!-- Center: LLM Model -->
  <rect x="540" y="175" width="160" height="100" rx="10" fill="url(#purple-grad)" stroke="#818cf8" stroke-width="2" filter="url(#glow-purple)" />
  <!-- Server / Cloud Icon -->
  <path d="M 620 205 A 15 15 0 0 1 650 205 A 12 12 0 0 1 660 215 A 10 10 0 0 1 650 225 L 590 225 A 10 10 0 0 1 580 215 A 12 12 0 0 1 590 205 A 15 15 0 0 1 620 205 Z" fill="#ffffff" opacity="0.9" />
  <text x="620" y="245" text-anchor="middle" class="title glow-text" font-size="16">☁️ LLM Model</text>

  <!-- Connection to Output -->
  <line x1="700" y1="225" x2="780" y2="225" stroke="#34d399" stroke-width="3" />
  <polygon points="775,220 785,225 775,230" fill="#34d399" />

  <!-- Right: Output Card -->
  <rect x="780" y="175" width="190" height="100" rx="10" fill="url(#green-grad)" stroke="#34d399" stroke-width="2" filter="url(#glow-green)" />
  <!-- Code Icon -->
  <path d="M 855 203 L 845 210 L 855 217 M 870 203 L 880 210 L 870 217 M 865 201 L 860 219" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9" />
  <text x="875" y="240" text-anchor="middle" class="title glow-text" font-size="13">Type-safe PEP8</text>
  <text x="875" y="258" text-anchor="middle" class="title glow-text" font-size="13">Python Code</text>
</svg>
