<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090a16" />
      <stop offset="100%" stop-color="#14143a" />
    </linearGradient>
    <linearGradient id="poison-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#991b1b" />
    </linearGradient>
    <linearGradient id="distract-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#c2410c" />
    </linearGradient>
    <linearGradient id="confuse-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <linearGradient id="clash-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e879f9" />
      <stop offset="100%" stop-color="#a21caf" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e4f" />
      <stop offset="100%" stop-color="#16163f" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#222554" stroke-width="2" />

  <!-- Styles -->
  <style>
    .title-text { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
    .card-title { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; fill: #ffffff; }
    .body-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: #d1d5db; }
    .solution-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: #34d399; font-weight: 600; }
  </style>

  <!-- Main Title -->
  <text x="500" y="40" class="title-text">4 Chế Độ Lỗi Bối Cảnh (Context Failure Modes — Karpathy Framework)</text>

  <!-- Card 1: Context Poisoning -->
  <rect x="40" y="70" width="430" height="150" rx="10" fill="url(#card-grad)" stroke="#ef4444" stroke-width="1.5" />
  <rect x="55" y="85" width="24" height="24" rx="4" fill="url(#poison-grad)" />
  <text x="67" y="102" font-family="'Font Awesome 5 Free'" font-weight="900" font-size="12" fill="white" text-anchor="middle">☠️</text>
  <text x="90" y="102" class="card-title">1. Context Poisoning (Nhiễm độc bối cảnh)</text>
  <text x="60" y="135" class="body-text">• Mô tả: Agent tạo ra fact sai ➜ nạp lại vào chat loop ➜ bị khuếch đại.</text>
  <text x="60" y="155" class="body-text">• Ví dụ: AI sinh code sai tên biến ➜ tự phân tích lỗi trên code sai đó.</text>
  <text x="60" y="185" class="solution-text">➜ Giải pháp: Tạo chốt chặn (Assertions) trước khi phản hồi ngược lại.</text>

  <!-- Card 2: Context Distraction -->
  <rect x="530" y="70" width="430" height="150" rx="10" fill="url(#card-grad)" stroke="#fb923c" stroke-width="1.5" />
  <rect x="545" y="85" width="24" height="24" rx="4" fill="url(#distract-grad)" />
  <text x="557" y="102" font-family="'Font Awesome 5 Free'" font-weight="900" font-size="12" fill="white" text-anchor="middle">📢</text>
  <text x="580" y="102" class="card-title">2. Context Distraction (Bối cảnh nhiễu)</text>
  <text x="550" y="135" class="body-text">• Mô tả: Lịch sử cuộc chat quá dài hoặc quá nhiều text thừa gây mất focus.</text>
  <text x="550" y="155" class="body-text">• Ví dụ: Trò chuyện 50 lượt khiến AI bắt đầu quên System Prompt.</text>
  <text x="550" y="185" class="solution-text">➜ Giải pháp: Cắt trượt bối cảnh (Sliding Window), tóm tắt chat history.</text>

  <!-- Card 3: Context Confusion -->
  <rect x="40" y="250" width="430" height="150" rx="10" fill="url(#card-grad)" stroke="#fbbf24" stroke-width="1.5" />
  <rect x="55" y="265" width="24" height="24" rx="4" fill="url(#confuse-grad)" />
  <text x="67" y="282" font-family="'Font Awesome 5 Free'" font-weight="900" font-size="12" fill="white" text-anchor="middle">🌀</text>
  <text x="90" y="282" class="card-title">3. Context Confusion (Hỗn loạn bối cảnh)</text>
  <text x="60" y="315" class="body-text">• Mô tả: Quá nhiều tool definitions hoặc tài liệu khiến AI gọi sai công cụ.</text>
  <text x="60" y="335" class="body-text">• Ví dụ: Khai báo 50 tools khiến AI bị loạn và chọn sai tool lấy data.</text>
  <text x="60" y="365" class="solution-text">➜ Giải pháp: Tải công cụ động (Dynamic Tooling), mô tả tool chi tiết.</text>

  <!-- Card 4: Context Clash -->
  <rect x="530" y="250" width="430" height="150" rx="10" fill="url(#card-grad)" stroke="#e879f9" stroke-width="1.5" />
  <rect x="545" y="265" width="24" height="24" rx="4" fill="url(#clash-grad)" />
  <text x="557" y="282" font-family="'Font Awesome 5 Free'" font-weight="900" font-size="12" fill="white" text-anchor="middle">⚡</text>
  <text x="580" y="282" class="card-title">4. Context Clash (Mâu thuẫn bối cảnh)</text>
  <text x="550" y="315" class="body-text">• Mô tả: Thông tin giữa các tài liệu được nạp vào bối cảnh mâu thuẫn nhau.</text>
  <text x="550" y="335" class="body-text">• Ví dụ: Tài liệu cũ ghi bảo hành 6 tháng, tài liệu mới ghi 12 tháng.</text>
  <text x="550" y="365" class="solution-text">➜ Giải pháp: Phân lớp ưu tiên (Layered priorities), giải quyết xung đột.</text>

</svg>
