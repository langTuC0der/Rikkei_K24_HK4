<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a1a" />
      <stop offset="100%" stop-color="#0c0e2b" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#1d2256" stroke-width="2" />

  <!-- Styles -->
  <style>
    .title-text { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
    .label-text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
    .desc-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: #9ca3af; text-anchor: middle; }
    .protocol-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: bold; fill: #22d3ee; text-anchor: middle; }
    .server-title { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; fill: #818cf8; }
    .server-desc { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #c084fc; }
  </style>

  <text x="500" y="35" class="title-text">Kiến Trúc Model Context Protocol (MCP) — 2026 Standard</text>

  <!-- LEFT: AI Application / MCP Client -->
  <rect x="50" y="110" width="240" height="230" rx="14" fill="url(#purple-grad)" stroke="#a78bfa" stroke-width="2" filter="url(#glow-purple)" />
  <circle cx="170" cy="180" r="35" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2" />
  <text x="170" y="185" font-family="'Font Awesome 5 Free'" font-weight="900" font-size="28" fill="white" text-anchor="middle">🧠</text>
  <text x="170" y="250" class="label-text">MCP CLIENT</text>
  <text x="170" y="270" class="label-text" font-size="12" fill="#e0e7ff">(LLM App / Orchestrator)</text>
  <text x="170" y="300" class="desc-text" fill="#f3e8ff">Tự khám phá công cụ &amp; bối cảnh</text>

  <!-- MIDDLE: Standardized Protocol Lanes -->
  <!-- Line 1 to DB -->
  <path d="M 290 190 L 460 130" fill="none" stroke="#22d3ee" stroke-width="3" stroke-dasharray="6,4" />
  <!-- Line 2 to File -->
  <path d="M 290 225 L 460 225" fill="none" stroke="#22d3ee" stroke-width="3" stroke-dasharray="6,4" />
  <!-- Line 3 to APIs -->
  <path d="M 290 260 L 460 320" fill="none" stroke="#22d3ee" stroke-width="3" stroke-dasharray="6,4" />
  
  <rect x="315" y="205" width="110" height="40" rx="6" fill="#0c0e2b" stroke="#22d3ee" stroke-width="1.5" filter="url(#glow-cyan)" />
  <text x="370" y="228" class="protocol-text">MCP GIAO THỨC</text>

  <!-- RIGHT: MCP Servers -->
  
  <!-- Server 1: Database -->
  <rect x="460" y="70" width="480" height="95" rx="10" fill="url(#card-grad)" stroke="#2d2d6a" stroke-width="1.5" />
  <text x="480" y="98" class="server-title">📁 MCP SERVER: CƠ SỞ DỮ LIỆU (Database)</text>
  <text x="480" y="122" class="desc-text" text-anchor="start">• Resource: `schema/customers`, `financial/reports`</text>
  <text x="480" y="140" class="server-desc" text-anchor="start">Exposes Tool: query_sql_db(query), get_user_profile(id)</text>

  <!-- Server 2: File System -->
  <rect x="460" y="177" width="480" height="95" rx="10" fill="url(#card-grad)" stroke="#2d2d6a" stroke-width="1.5" />
  <text x="480" y="205" class="server-title">💻 MCP SERVER: HỆ THỐNG LẬP TRÌNH (Dev Tools / Files)</text>
  <text x="480" y="229" class="desc-text" text-anchor="start">• Resource: `workspace/src/*`, `logs/production`</text>
  <text x="480" y="247" class="server-desc" text-anchor="start">Exposes Tool: write_to_file(path, content), read_log(lines)</text>

  <!-- Server 3: Web APIs / Services -->
  <rect x="460" y="285" width="480" height="95" rx="10" fill="url(#card-grad)" stroke="#2d2d6a" stroke-width="1.5" />
  <text x="480" y="313" class="server-title">☁️ MCP SERVER: WEB APIS / SERVICES (Slack, Email, Search)</text>
  <text x="480" y="337" class="desc-text" text-anchor="start">• Resource: `slack/channels`, `google/search_results`</text>
  <text x="480" y="355" class="server-desc" text-anchor="start">Exposes Tool: send_slack_msg(channel, text), web_search(q)</text>

</svg>
