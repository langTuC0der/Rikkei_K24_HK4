<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14" />
      <stop offset="100%" stop-color="#0f0f35" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="pink-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#db2777" />
      <stop offset="100%" stop-color="#be185d" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#222554" stroke-width="2" />

  <style>
    .title-text { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
    .label-text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
    .desc-text { font-family: 'Inter', sans-serif; font-size: 10px; fill: #94a3b8; text-anchor: middle; }
    .protocol-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #38bdf8; text-anchor: middle; font-weight: 700; }
  </style>

  <text x="500" y="45" class="title-text">Hệ Thống Đa Tác Nhân Multi-Agent & Giao Thức A2A</text>

  <!-- Central Orchestrator -->
  <rect x="390" y="80" width="220" height="90" rx="12" fill="url(#blue-grad)" stroke="#60a5fa" stroke-width="2.5" filter="url(#glow-blue)" />
  <text x="500" y="120" class="label-text">ORCHESTRATOR</text>
  <text x="500" y="142" class="desc-text" fill="#dbeafe">LangGraph / Google ADK</text>

  <!-- Sub Agents -->
  
  <!-- Agent 1: Research Agent (Left) -->
  <rect x="90" y="270" width="220" height="100" rx="10" fill="url(#cyan-grad)" stroke="#38bdf8" stroke-width="2" />
  <text x="200" y="305" class="label-text">Research Agent</text>
  <text x="200" y="330" class="desc-text" fill="#e0f2fe">MCP: Google Search, Databases</text>
  <text x="200" y="348" class="desc-text" fill="#bae6fd">Nhiệm vụ: Trích xuất tri thức</text>

  <!-- Agent 2: Writer Agent (Middle) -->
  <rect x="390" y="270" width="220" height="100" rx="10" fill="url(#cyan-grad)" stroke="#38bdf8" stroke-width="2" />
  <text x="500" y="305" class="label-text">Writer Agent</text>
  <text x="500" y="330" class="desc-text" fill="#e0f2fe">MCP: Templates, Code files</text>
  <text x="500" y="348" class="desc-text" fill="#bae6fd">Nhiệm vụ: Viết báo cáo / Viết mã</text>

  <!-- Agent 3: Reviewer Agent (Right) -->
  <rect x="690" y="270" width="220" height="100" rx="10" fill="url(#pink-grad)" stroke="#f472b6" stroke-width="2" />
  <text x="800" y="305" class="label-text">Reviewer / Critic Agent</text>
  <text x="800" y="330" class="desc-text" fill="#fce7f3">A2A: Safety &amp; Style review</text>
  <text x="800" y="348" class="desc-text" fill="#fbcfe8">Nhiệm vụ: Đánh giá và Chấm điểm</text>

  <!-- Communication Paths -->
  <!-- Orchestrator <-> Research -->
  <path d="M 400 170 L 250 270" fill="none" stroke="#60a5fa" stroke-width="2" />
  <polygon points="250,260 250,270 260,265" fill="#60a5fa" />
  <rect x="250" y="200" width="80" height="20" rx="4" fill="#0f172a" stroke="#60a5fa" stroke-width="1" />
  <text x="290" y="213" class="protocol-text">MCP / A2A</text>

  <!-- Orchestrator <-> Writer -->
  <path d="M 500 170 L 500 270" fill="none" stroke="#60a5fa" stroke-width="2" />
  <polygon points="495,260 500,270 505,260" fill="#60a5fa" />
  <rect x="460" y="200" width="80" height="20" rx="4" fill="#0f172a" stroke="#60a5fa" stroke-width="1" />
  <text x="500" y="213" class="protocol-text">MCP / A2A</text>

  <!-- Orchestrator <-> Reviewer -->
  <path d="M 600 170 L 750 270" fill="none" stroke="#f472b6" stroke-width="2" />
  <polygon points="740,265 750,270 750,260" fill="#f472b6" />
  <rect x="670" y="200" width="80" height="20" rx="4" fill="#0f172a" stroke="#f472b6" stroke-width="1" />
  <text x="710" y="213" class="protocol-text" fill="#f472b6">A2A Protocol</text>
  
  <!-- Handoff line between Research and Writer -->
  <path d="M 310 320 L 390 320" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="4,2" />
  <polygon points="380,316 390,320 380,324" fill="#34d399" />
  <text x="350" y="312" class="protocol-text" fill="#34d399" font-size="8">Handoff</text>

  <!-- Handoff line between Writer and Reviewer -->
  <path d="M 610 320 L 690 320" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="4,2" />
  <polygon points="680,316 690,320 680,324" fill="#34d399" />
  <text x="650" y="312" class="protocol-text" fill="#34d399" font-size="8">Handoff</text>
</svg>
