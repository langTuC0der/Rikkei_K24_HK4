<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14" />
      <stop offset="100%" stop-color="#0f0f35" />
    </linearGradient>
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#991b1b" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#065f46" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="#222554" stroke-width="2" />

  <style>
    .title-text { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
    .label-text { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
    .desc-text { font-family: 'Inter', sans-serif; font-size: 10px; fill: #e2e8f0; text-anchor: middle; }
    .status-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ef4444; text-anchor: middle; font-weight: 700; }
  </style>

  <text x="500" y="45" class="title-text">Hệ Thống Rào Chắn Bảo Mật 3 Lớp (Guardrails Architecture)</text>

  <!-- Step 0: User Input -->
  <rect x="30" y="180" width="100" height="60" rx="6" fill="#1e293b" stroke="#475569" />
  <text x="80" y="215" class="label-text">User Query</text>

  <!-- Arrow 1 -->
  <path d="M 130 210 L 160 210" fill="none" stroke="#64748b" stroke-width="2" />
  <polygon points="155,207 160,210 155,213" fill="#64748b" />

  <!-- Layer 1: Input Guardrail -->
  <rect x="160" y="160" width="160" height="100" rx="10" fill="url(#red-grad)" stroke="#ef4444" stroke-width="2" />
  <text x="240" y="195" class="label-text">INPUT GUARDRAILS</text>
  <text x="240" y="215" class="desc-text">• Injection Detection</text>
  <text x="240" y="230" class="desc-text">• PII Masking</text>

  <!-- Arrow 2 -->
  <path d="M 320 210 L 360 210" fill="none" stroke="#ef4444" stroke-width="2.5" />
  <polygon points="355,207 360,210 355,213" fill="#ef4444" />

  <!-- Core LLM -->
  <rect x="360" y="160" width="140" height="100" rx="10" fill="url(#blue-grad)" stroke="#3b82f6" stroke-width="2" />
  <text x="430" y="200" class="label-text">LLM CORE</text>
  <text x="430" y="220" class="desc-text">Xử lý &amp; Phản hồi</text>

  <!-- Arrow 3 -->
  <path d="M 500 210 L 540 210" fill="none" stroke="#3b82f6" stroke-width="2.5" />
  <polygon points="535,207 540,210 535,213" fill="#3b82f6" />

  <!-- Layer 2: Output Guardrail -->
  <rect x="540" y="160" width="160" height="100" rx="10" fill="url(#red-grad)" stroke="#ef4444" stroke-width="2" />
  <text x="620" y="195" class="label-text">OUTPUT GUARDRAILS</text>
  <text x="620" y="215" class="desc-text">• Schema Check (JSON)</text>
  <text x="620" y="230" class="desc-text">• Fact Checking</text>

  <!-- Arrow 4 -->
  <path d="M 700 210 L 740 210" fill="none" stroke="#ef4444" stroke-width="2.5" />
  <polygon points="735,207 740,210 735,213" fill="#ef4444" />

  <!-- Layer 3: Action Guardrail -->
  <rect x="740" y="160" width="160" height="100" rx="10" fill="url(#gold-grad)" stroke="#f59e0b" stroke-width="2" />
  <text x="820" y="195" class="label-text">ACTION GUARDRAILS</text>
  <text x="820" y="215" class="desc-text">• Isolated Sandbox</text>
  <text x="820" y="230" class="desc-text">• Sensitive Check</text>

  <!-- Final Execution Arrow -->
  <path d="M 900 210 L 930 210 L 930 320 L 610 320" fill="none" stroke="#10b981" stroke-width="3" filter="url(#glow-green)" />
  <polygon points="620,315 610,320 620,325" fill="#10b981" />

  <!-- Execution Node -->
  <rect x="420" y="290" width="190" height="60" rx="8" fill="url(#green-grad)" stroke="#10b981" stroke-width="2" />
  <text x="515" y="325" class="label-text">SAFE EXECUTION</text>

  <!-- Human Approval Sub-Loop for Action Guardrail -->
  <path d="M 820 260 L 820 380 L 515 380 L 515 350" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3" />
  <polygon points="510,360 515,350 520,360" fill="#f59e0b" />
  <rect x="620" y="365" width="150" height="24" rx="6" fill="#0f172a" stroke="#f59e0b" />
  <text x="695" y="381" class="desc-text" fill="#fbbf24" font-weight="700">HUMAN APPROVAL (Nếu nhạy cảm)</text>
</svg>
