spring.application.name=chat_memory

# Cấu hình lựa chọn LLM Provider hoạt động:
# - ollama: Sử dụng Ollama chạy cục bộ (Offline)
# - deepseek: Sử dụng DeepSeek API (Cấu hình qua tương thích OpenAI)
# - gemini-studio: Sử dụng Google AI Studio (Cấu hình qua tương thích OpenAI)
# - openai: Sử dụng OpenAI GPT chính thức (Cấu hình qua tương thích OpenAI)
app.chat-provider=deepseek

# =====================================================================
# 1. CẤU HÌNH DÀNH CHO CỔNG TƯƠNG THÍCH OPENAI (DEEPSEEK / GEMINI STUDIO / OPENAI)
# =====================================================================
# CHÚ Ý: Vì chỉ sử dụng 'spring-ai-starter-model-openai', bạn chỉ kích hoạt một trong các khối cấu hình dưới đây
# (Khối được bỏ comment sẽ là khối hoạt động).

# --- [A] CẤU HÌNH DEEPSEEK API (Mặc định đang kích hoạt) ---
spring.ai.openai.base-url=https://api.deepseek.com
spring.ai.openai.api-key=${API_KEY_DEEPSEEK}
spring.ai.openai.chat.options.model=deepseek-v4-flash
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=2048

# --- [B] CẤU HÌNH GOOGLE AI STUDIO GEMINI ---
# (Để sử dụng, hãy comment phần [A] ở trên và bỏ comment phần [B] này)
# spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
# spring.ai.openai.api-key=YOUR_GEMINI_API_KEY
# spring.ai.openai.chat.options.model=gemini-1.5-flash
# spring.ai.openai.chat.options.temperature=0.7

# --- [C] CẤU HÌNH OPENAI GPT CHÍNH THỨC ---
# (Để sử dụng, hãy comment phần [A] ở trên và bỏ comment phần [C] này)
# spring.ai.openai.base-url=https://api.openai.com/v1
# spring.ai.openai.api-key=YOUR_OPENAI_API_KEY
# spring.ai.openai.chat.options.model=gpt-4o-mini
# spring.ai.openai.chat.options.temperature=0.7

# Các cấu hình phụ khác cho OpenAI Starter
spring.ai.openai.chat.enabled=true
spring.ai.openai.audio.speech.enabled=false
spring.ai.openai.audio.transcription.enabled=false
spring.ai.openai.image.enabled=false
spring.ai.openai.embedding.enabled=false

# =====================================================================
# 2. CẤU HÌNH OLLAMA (Chạy offline cục bộ)
# =====================================================================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen2.5:7b
spring.ai.ollama.chat.options.temperature=0.7
