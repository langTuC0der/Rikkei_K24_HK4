spring.application.name=function_calling

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model= qwen2.5:7b
spring.ai.ollama.chat.temperature=0.7

# Cấu hình lựa chọn LLM Provider hoạt động:
# - ollama: Sử dụng Ollama chạy cục bộ
# - gemini: Sử dụng Google AI Studio (Gemini API Key trực tiếp qua OpenAI-compatible endpoint)
app.chat-provider=gemini

# Cấu hình Google AI Studio Gemini (Sử dụng API Key trực tiếp qua OpenAI-compatible endpoint)
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.api-key=${API_KEY_GEMINI}
spring.ai.openai.chat.options.model=gemini-2.5-flash
spring.ai.openai.chat.options.temperature=0.7