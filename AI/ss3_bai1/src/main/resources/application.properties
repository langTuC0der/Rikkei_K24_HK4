spring.application.name=ss3_bai1

## 1. Google Vertex AI (Gemini) - Primary
#spring.ai.vertex.ai.gemini.project-id=${GCP_PROJECT_ID:mock-project}
#spring.ai.vertex.ai.gemini.location=us-central1
#spring.ai.vertex.ai.gemini.chat.options.model=gemini-1.5-flash
#spring.ai.vertex.ai.gemini.chat.options.temperature=0.7

## 2. OpenAI - Secondary Fallback
## Thay YOUR_OPENAI_API_KEY bằng key thật khi cần dùng
spring.ai.openai.api-key=${OPENAI_API_KEY:YOUR_OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
## Disable các model OpenAI không cần thiết (audio, image, transcription...)
spring.ai.openai.audio.speech.enabled=false
spring.ai.openai.audio.transcription.enabled=false
spring.ai.openai.image.enabled=false
spring.ai.openai.embedding.enabled=false

## 3. Ollama - Local Fallback ($0 cost)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen2.5:7b
spring.ai.ollama.chat.options.temperature=0.7

## Disable Vertex AI nếu chưa cấu hình GCP
spring.ai.vertex.ai.gemini.project-id=${GCP_PROJECT_ID:mock-project}
spring.ai.vertex.ai.gemini.location=us-central1
spring.ai.vertex.ai.gemini.chat.options.model=gemini-1.5-flash
